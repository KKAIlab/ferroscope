name: Deploy FerroScope to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ["Refresh FerroScope intelligence"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build static artifact
        run: |
          mkdir _site
          cp index.html app.js styles.css v09.css README.md _site/
          cp -R data _site/data
          # app.js imports lib/records.mjs and lib/graph.mjs at runtime; without them the
          # page loads no module at all, so the copy is not optional.
          cp -R lib _site/lib
          touch _site/.nojekyll
      - name: Fail if the artifact is missing a runtime module
        run: test -f _site/lib/records.mjs && test -f _site/lib/graph.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
