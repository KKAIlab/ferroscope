name: Refresh FerroScope intelligence

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch primary sources
        run: npm run update
      - name: Validate generated data
        run: npm run check
      - name: Commit fresh data when changed
        run: |
          git config user.name "ferroscope-bot"
          git config user.email "ferroscope-bot@users.noreply.github.com"
          git add data/live.json data/meta.json
          git diff --cached --quiet || git commit -m "data: refresh ferroptosis intelligence"
          git push
