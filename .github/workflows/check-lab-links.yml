name: Check FerroScope lab links

on:
  workflow_dispatch:
  schedule:
    - cron: "41 3 * * 1"

permissions:
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check lab websites and TLS
        run: npm run check:links
