name: Check FerroScope external links

on:
  workflow_dispatch:
  schedule:
    - cron: "41 3 * * 1"

permissions:
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check laboratory sites, external resources and declared method sources
        run: npm run check:links
      - name: Keep the link-health report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-health
          path: docs/link-health.json
          if-no-files-found: warn
